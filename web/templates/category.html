<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/static/css/style.css">
  <title>{{.Title}}</title>
</head>
<body>
<header>
  <h1>Репетиторы в категории</h1>
  <a href="/" class="back-link">← На главную к предметам</a>
</header>

<main>
  <div class="tutor-grid">
    {{range .Tutors}}
    <div class="tutor-card">
      <div class="tutor-info">
        <h3>{{.Name}}</h3>
        <p class="description">{{.Description}}</p>
        <div class="price">{{.HourlyRate}} ₽/час</div>
      </div>
      <a href="/tutor/{{.UserID}}" class="btn">Профиль</a>
    </div>
    {{else}}
    <div class="empty-state">
      <p>К сожалению, в этой категории пока нет репетиторов.</p>
      <a href="/tutors">Посмотреть всех</a>
    </div>
    {{end}}
  </div>
</main>
</body>
</html>
